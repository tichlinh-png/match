<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Memory Match — EZ English</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f4f9;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:2rem 1rem}
#app{width:100%;max-width:480px}
.screen{display:none}.screen.active{display:block}

.page-header{text-align:center;margin-bottom:2rem}
.page-header .game-icon{font-size:40px;margin-bottom:.5rem}
.page-header h1{font-size:24px;font-weight:600;color:#1a1a2e}
.page-header p{font-size:14px;color:#666;margin-top:5px}

.seg-label{font-size:11px;font-weight:600;color:#999;letter-spacing:.07em;text-transform:uppercase;margin-bottom:10px}

.mode-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.75rem}
.mode-card{background:#fff;border:1.5px solid #e8e6f0;border-radius:16px;padding:1.1rem .75rem;text-align:center;cursor:pointer;transition:all .18s}
.mode-card:hover{border-color:#a49de0;background:#faf9ff}
.mode-card.sel{border:2px solid #534AB7;background:#EEEDFE}
.mode-card .mico{font-size:28px;margin-bottom:8px}
.mode-card .mlbl{font-size:13px;font-weight:600;color:#1a1a2e}
.mode-card .msub{font-size:11px;color:#999;margin-top:3px}
.mode-card.sel .mlbl{color:#3C3489}
.mode-card.sel .msub{color:#534AB7}

.time-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1.75rem}
.t-btn{background:#fff;border:1.5px solid #e8e6f0;border-radius:12px;padding:.65rem;text-align:center;cursor:pointer;transition:all .18s}
.t-btn:hover{border-color:#a49de0}
.t-btn.sel{border:2px solid #534AB7;background:#EEEDFE}
.t-btn .t-sec{font-size:22px;font-weight:600;display:block;color:#1a1a2e}
.t-btn .t-lbl{font-size:11px;display:block;color:#999;margin-top:2px}
.t-btn.sel .t-sec,.t-btn.sel .t-lbl{color:#3C3489}

.play-btn{width:100%;padding:.95rem;background:#534AB7;color:#fff;border:none;border-radius:14px;font-size:16px;font-weight:600;cursor:pointer;transition:background .18s;letter-spacing:.01em}
.play-btn:hover{background:#3C3489}
.play-btn:active{transform:scale(.98)}

.hud{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1rem}
.hud-pill{background:#fff;border:1px solid #e8e6f0;border-radius:14px;padding:.65rem .5rem;text-align:center}
.hud-val{font-size:20px;font-weight:600;color:#1a1a2e}
.hud-lbl{font-size:10px;color:#999;margin-top:2px;text-transform:uppercase;letter-spacing:.05em}
.hud-timer-val{font-size:20px;font-weight:600;color:#1a1a2e;transition:color .3s}
.hud-timer-val.warn{color:#e05a2b}

.board{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-bottom:1rem}
.cw{perspective:700px;cursor:pointer;aspect-ratio:1}
.ci{position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:transform .32s cubic-bezier(.4,0,.2,1)}
.cw.flipped .ci,.cw.matched .ci{transform:rotateY(180deg)}
.cf{position:absolute;inset:0;border-radius:14px;backface-visibility:hidden;display:flex;align-items:center;justify-content:center;flex-direction:column}
.cb{background:#534AB7;border:none}
.cb-inner{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;padding:8px}
.cb-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.25)}
.cf-front{background:#fff;border:1.5px solid #e8e6f0;transform:rotateY(180deg);gap:3px;padding:6px;transition:background .2s,border-color .2s}
.cw.matched .cf-front{background:#EEEDFE;border-color:#AFA9EC}
.cw.wrong .cf-front{background:#fff0f0;border-color:#f0b0b0}

.emo-wrap{flex:1;width:100%;display:flex;align-items:center;justify-content:center}
.emo-span{line-height:1;display:block}
.word-cap{font-size:10px;font-weight:500;color:#aaa;letter-spacing:.02em;flex-shrink:0;text-align:center;padding:0 2px}
.word-only{font-weight:600;color:#1a1a2e;text-align:center;padding:6px;display:flex;align-items:center;justify-content:center;width:100%;height:100%;line-height:1.2}

.result-wrap{background:#fff;border:1px solid #e8e6f0;border-radius:20px;padding:2rem 1.5rem;text-align:center;margin-bottom:1.25rem}
.result-stars{font-size:32px;margin-bottom:.6rem}
.result-pts{font-size:56px;font-weight:700;color:#534AB7;line-height:1}
.result-lbl{font-size:14px;color:#999;margin-top:5px}
.result-meta{margin-top:1.1rem;display:flex;justify-content:center;gap:8px;flex-wrap:wrap}
.result-badge{background:#f5f4f9;border-radius:8px;padding:.3rem .75rem;font-size:12px;color:#666;font-weight:500}

.save-row{display:flex;gap:8px;margin-bottom:1.25rem}
.save-row input{flex:1;padding:.65rem .9rem;border:1.5px solid #e8e6f0;border-radius:12px;font-size:14px;background:#fff;color:#1a1a2e;outline:none;transition:border-color .18s}
.save-row input:focus{border-color:#534AB7}
.save-row button{padding:.65rem 1.2rem;background:#534AB7;color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap}
.save-row button:hover{background:#3C3489}

.act-row{display:flex;gap:8px}
.act-btn{flex:1;padding:.72rem;border:1.5px solid #e8e6f0;border-radius:12px;background:#fff;color:#1a1a2e;font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .18s}
.act-btn:hover{background:#f5f4f9;border-color:#c8c4e0}
.act-btn:active{transform:scale(.97)}
.act-btn.primary{background:#534AB7;color:#fff;border-color:#534AB7}
.act-btn.primary:hover{background:#3C3489}

.lb-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem}
.lb-tab{padding:.32rem .75rem;border:1.5px solid #e8e6f0;border-radius:8px;font-size:12px;cursor:pointer;color:#666;background:#fff;font-weight:500;transition:all .15s}
.lb-tab:hover{border-color:#a49de0;color:#534AB7}
.lb-tab.active{background:#534AB7;color:#fff;border-color:#534AB7}
.lb-empty{text-align:center;padding:2.5rem 1rem;color:#aaa;font-size:14px}

.lb-table{width:100%;border-collapse:collapse;margin-bottom:1.25rem;background:#fff;border-radius:16px;overflow:hidden;border:1px solid #e8e6f0}
.lb-table th{font-size:11px;font-weight:600;color:#aaa;text-transform:uppercase;letter-spacing:.05em;padding:.6rem .85rem;text-align:left;background:#faf9ff;border-bottom:1px solid #e8e6f0}
.lb-table td{padding:.6rem .85rem;font-size:13px;color:#1a1a2e;border-bottom:1px solid #f0eef8}
.lb-table tr:last-child td{border-bottom:none}
.lb-table tr.hi td{background:#EEEDFE}
.pts-cell{font-weight:600;color:#534AB7}

@media(max-width:400px){
  body{padding:1rem .75rem}
  .mode-card .mico{font-size:22px}
  .result-pts{font-size:44px}
}
</style>
</head>
<body>
<div id="app">

<div id="s-setup" class="screen active">
  <div class="page-header">
    <div class="game-icon">🃏</div>
    <h1>Memory Match</h1>
    <p>Lật thẻ · Tìm cặp · Ghi điểm cao nhất</p>
  </div>
  <div class="seg-label">Loại thẻ</div>
  <div class="mode-grid">
    <div class="mode-card sel" onclick="pickMode(this,'emoji')">
      <div class="mico">🐶</div><div class="mlbl">Hình ảnh</div><div class="msub">Emoji dễ thương</div>
    </div>
    <div class="mode-card" onclick="pickMode(this,'words')">
      <div class="mico">📖</div><div class="mlbl">Từ vựng</div><div class="msub">Tiếng Anh cơ bản</div>
    </div>
    <div class="mode-card" onclick="pickMode(this,'mixed')">
      <div class="mico">🌟</div><div class="mlbl">Kết hợp</div><div class="msub">Hình ghép chữ</div>
    </div>
  </div>
  <div class="seg-label">Thời gian</div>
  <div class="time-row">
    <div class="t-btn sel" onclick="pickTime(this,30)"><span class="t-sec">30</span><span class="t-lbl">giây</span></div>
    <div class="t-btn" onclick="pickTime(this,45)"><span class="t-sec">45</span><span class="t-lbl">giây</span></div>
    <div class="t-btn" onclick="pickTime(this,60)"><span class="t-sec">60</span><span class="t-lbl">giây</span></div>
  </div>
  <button class="play-btn" onclick="startGame()">Bắt đầu chơi ▶</button>
</div>

<div id="s-game" class="screen">
  <div class="hud">
    <div class="hud-pill"><div class="hud-val" id="h-score">0</div><div class="hud-lbl">Điểm</div></div>
    <div class="hud-pill"><div class="hud-timer-val" id="h-time">30</div><div class="hud-lbl">Còn lại</div></div>
    <div class="hud-pill"><div class="hud-val" id="h-pairs">0 / 8</div><div class="hud-lbl">Cặp</div></div>
  </div>
  <div id="board" class="board"></div>
</div>

<div id="s-result" class="screen">
  <div class="result-wrap">
    <div class="result-stars" id="r-stars">⭐⭐⭐</div>
    <div class="result-pts" id="r-score">0</div>
    <div class="result-lbl">điểm</div>
    <div class="result-meta" id="r-meta"></div>
  </div>
  <div class="seg-label" style="margin-bottom:10px">Lưu điểm</div>
  <div class="save-row">
    <input id="pname" type="text" placeholder="Tên của bạn..." maxlength="20"/>
    <button onclick="saveScore()">Lưu ↗</button>
  </div>
  <div class="act-row">
    <button class="act-btn" onclick="showScreen('s-setup')">⚙ Cài đặt</button>
    <button class="act-btn primary" onclick="startGame()">↺ Chơi lại</button>
    <button class="act-btn" onclick="showLB()">🏆 BXH</button>
  </div>
</div>

<div id="s-lb" class="screen">
  <div class="page-header" style="margin-bottom:1.25rem">
    <div class="game-icon">🏆</div>
    <h1>Bảng xếp hạng</h1>
  </div>
  <div class="lb-tabs" id="lb-tabs"></div>
  <div id="lb-body"></div>
  <div class="act-row">
    <button class="act-btn" onclick="showScreen('s-setup')">⚙ Cài đặt</button>
    <button class="act-btn primary" onclick="startGame()">↺ Chơi lại</button>
  </div>
</div>

</div>
<script>
const DATA=[
  {e:'🐶',w:'dog'},{e:'🐱',w:'cat'},{e:'🐸',w:'frog'},{e:'🐻',w:'bear'},
  {e:'🐯',w:'tiger'},{e:'🦁',w:'lion'},{e:'🐧',w:'penguin'},{e:'🦊',w:'fox'},
  {e:'🐘',w:'elephant'},{e:'🦒',w:'giraffe'},{e:'🐬',w:'dolphin'},{e:'🦋',w:'butterfly'},
  {e:'🍎',w:'apple'},{e:'🍌',w:'banana'},{e:'🍓',w:'strawberry'},{e:'🍕',w:'pizza'},
  {e:'🚀',w:'rocket'},{e:'⭐',w:'star'},{e:'🌈',w:'rainbow'},{e:'🎈',w:'balloon'},
  {e:'🌸',w:'flower'},{e:'🎵',w:'music'},{e:'🎂',w:'cake'},{e:'🏆',w:'trophy'}
];

let mode='emoji',secs=30,cards=[],flipped=[],matched=0,score=0,ticker=null,left=0,lastR=null;

function pickMode(el,m){
  document.querySelectorAll('.mode-card').forEach(c=>c.classList.remove('sel'));
  el.classList.add('sel'); mode=m;
}
function pickTime(el,t){
  document.querySelectorAll('.t-btn').forEach(b=>b.classList.remove('sel'));
  el.classList.add('sel'); secs=t;
}
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function shuf(a){return a.slice().sort(()=>Math.random()-.5)}

function buildDeck(){
  const pool=shuf(DATA).slice(0,8);
  let d=[];
  pool.forEach((it,i)=>{
    if(mode==='emoji'){
      d.push({id:i,type:'emoji',val:it.e,hint:it.w});
      d.push({id:i,type:'emoji',val:it.e,hint:it.w});
    } else if(mode==='words'){
      d.push({id:i,type:'word',val:it.w,hint:''});
      d.push({id:i,type:'word',val:it.w,hint:''});
    } else {
      d.push({id:i,type:'emoji',val:it.e,hint:it.w});
      d.push({id:i,type:'word',val:it.w,hint:''});
    }
  });
  return shuf(d);
}

function startGame(){
  cards=buildDeck(); matched=0; score=0; flipped=[]; left=secs;
  renderBoard(); syncHud(); showScreen('s-game');
  clearInterval(ticker);
  ticker=setInterval(()=>{
    left--;
    const el=document.getElementById('h-time');
    el.textContent=left;
    el.classList.toggle('warn',left<=10);
    if(left<=0) endGame();
  },1000);
}

function renderBoard(){
  const b=document.getElementById('board');
  b.innerHTML='';
  cards.forEach((c,i)=>{
    const w=document.createElement('div');
    w.className='cw'; w.dataset.i=i;
    const dots=Array(9).fill('<div class="cb-dot"></div>').join('');
    const front=c.type==='emoji'
      ?`<div class="emo-wrap"><span class="emo-span">${c.val}</span></div><div class="word-cap">${c.hint}</div>`
      :`<div class="word-only word-txt">${c.val}</div>`;
    w.innerHTML=`<div class="ci">
      <div class="cf cb"><div class="cb-inner">${dots}</div></div>
      <div class="cf cf-front">${front}</div>
    </div>`;
    w.addEventListener('click',()=>flip(i));
    b.appendChild(w);
  });
  requestAnimationFrame(()=>{
    const first=b.querySelector('.cw');
    if(!first) return;
    const sz=first.offsetWidth;
    const eSz=Math.max(18,Math.floor(sz*.48))+'px';
    const wSz=Math.max(10,Math.floor(sz*.15))+'px';
    const wordSz=Math.max(11,Math.floor(sz*.17))+'px';
    b.querySelectorAll('.emo-span').forEach(el=>el.style.fontSize=eSz);
    b.querySelectorAll('.word-cap').forEach(el=>el.style.fontSize=wSz);
    b.querySelectorAll('.word-txt').forEach(el=>el.style.fontSize=wordSz);
  });
}

function flip(i){
  if(flipped.length>=2) return;
  const el=document.querySelector(`.cw[data-i="${i}"]`);
  if(!el||el.classList.contains('flipped')||el.classList.contains('matched')) return;
  el.classList.add('flipped'); flipped.push(i);
  if(flipped.length===2){
    const[a,b]=flipped;
    if(cards[a].id===cards[b].id){
      setTimeout(()=>{
        [a,b].forEach(x=>document.querySelector(`.cw[data-i="${x}"]`).classList.add('matched'));
        matched++; score+=Math.ceil(10+left/secs*10);
        syncHud(); flipped=[];
        if(matched===8) endGame();
      },280);
    } else {
      [a,b].forEach(x=>document.querySelector(`.cw[data-i="${x}"]`).classList.add('wrong'));
      setTimeout(()=>{
        [a,b].forEach(x=>{
          const el=document.querySelector(`.cw[data-i="${x}"]`);
          el.classList.remove('flipped','wrong');
        });
        flipped=[];
      },750);
    }
  }
}

function syncHud(){
  document.getElementById('h-score').textContent=score;
  document.getElementById('h-pairs').textContent=matched+' / 8';
  document.getElementById('h-time').textContent=left;
}

function endGame(){
  clearInterval(ticker);
  const bonus=matched===8?Math.ceil(left*2):0;
  score+=bonus;
  lastR={score,matched,mode,secs,ts:Date.now()};
  document.getElementById('r-stars').textContent=matched>=8?'⭐⭐⭐':matched>=5?'⭐⭐':matched>=2?'⭐':'😅';
  document.getElementById('r-score').textContent=score;
  const mn={emoji:'Hình ảnh',words:'Từ vựng',mixed:'Kết hợp'};
  document.getElementById('r-meta').innerHTML=
    `<div class="result-badge">${mn[mode]}</div>`+
    `<div class="result-badge">${secs}s</div>`+
    `<div class="result-badge">${matched}/8 cặp</div>`+
    (bonus?`<div class="result-badge">+${bonus} bonus 🎉</div>`:'');
  showScreen('s-result');
}

function saveScore(){
  const name=document.getElementById('pname').value.trim()||'Ẩn danh';
  if(!lastR) return;
  const key=`mmv3_${lastR.mode}_${lastR.secs}`;
  let lb=[];
  try{lb=JSON.parse(localStorage.getItem(key)||'[]')}catch(e){}
  lb.push({name,score:lastR.score,matched:lastR.matched,ts:lastR.ts});
  lb.sort((a,b)=>b.score-a.score);
  lb=lb.slice(0,10);
  localStorage.setItem(key,JSON.stringify(lb));
  document.getElementById('pname').value='';
  showLB(lastR.mode,lastR.secs);
}

function showLB(m,t){
  m=m||mode; t=t||secs;
  showScreen('s-lb');
  const modes=['emoji','words','mixed'],times=[30,45,60];
  const mn={emoji:'Hình ảnh',words:'Từ vựng',mixed:'Kết hợp'};
  const tabs=document.getElementById('lb-tabs');
  tabs.innerHTML='';
  modes.forEach(mm=>times.forEach(tt=>{
    const key=`mmv3_${mm}_${tt}`;
    let lb=[];
    try{lb=JSON.parse(localStorage.getItem(key)||'[]')}catch(e){}
    if(!lb.length) return;
    const tb=document.createElement('div');
    tb.className='lb-tab'+(mm===m&&tt===t?' active':'');
    tb.textContent=`${mn[mm]} ${tt}s`;
    tb.onclick=()=>showLB(mm,tt);
    tabs.appendChild(tb);
  }));
  const key=`mmv3_${m}_${t}`;
  let lb=[];
  try{lb=JSON.parse(localStorage.getItem(key)||'[]')}catch(e){}
  const body=document.getElementById('lb-body');
  if(!lb.length){
    body.innerHTML='<div class="lb-empty">Chưa có điểm nào.<br>Hãy chơi và lưu điểm đầu tiên! 🎮</div>';
    return;
  }
  const medals=['🥇','🥈','🥉'];
  const hiTs=lastR?lastR.ts:0;
  body.innerHTML=`<table class="lb-table">
    <thead><tr>
      <th style="width:44px">#</th>
      <th>Tên</th>
      <th style="text-align:right">Điểm</th>
      <th style="text-align:right">Cặp</th>
    </tr></thead>
    <tbody>${lb.map((r,i)=>`<tr${r.ts===hiTs?' class="hi"':''}>
      <td>${medals[i]||i+1}</td>
      <td>${r.name}</td>
      <td style="text-align:right" class="pts-cell">${r.score}</td>
      <td style="text-align:right;color:#aaa">${r.matched}/8</td>
    </tr>`).join('')}</tbody>
  </table>`;
}
</script>
</body>
</html>
